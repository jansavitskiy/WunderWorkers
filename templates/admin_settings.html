{% extends 'base.html' %}
{% block title %}Настройки админа{% endblock %}
{% block extra_css %}
<link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
{% endblock %}

{% block body %}
<div class="admin-dashboard">
    <h1>⚙️ Настройки системы</h1>
    <a href="{{ url_for('admin_panel') }}" class="btn-secondary">← Назад</a>

    <div style="margin-top: 2rem;">
        <h3>Сменить пароль администратора</h3>
        <form id="admin-password-form" method="POST" action="{{ url_for('admin_settings') }}" style="max-width: 400px;">
            <div class="form-group">
                <label>Старый пароль</label>
                <input type="password" name="old_password" required>
            </div>
            <div class="form-group">
                <label>Новый пароль</label>
                <input type="password" name="new_password" minlength="5" required>
            </div>
            <div class="form-group">
                <label>Повторите пароль</label>
                <input type="password" name="confirm" required>
            </div>
        </form>
        <div class="settings-actions" style="display: flex; flex-wrap: wrap; gap: 1rem; align-items: center; margin-top: 0.5rem;">
            <button type="submit" form="admin-password-form" class="btn-primary">Обновить пароль</button>
            <a href="{{ url_for('admin_organizations') }}" class="btn-secondary">Управление организациями</a>
        </div>
    </div>

    <div style="margin-top: 2rem;">
        <h3>Резервное копирование БД</h3>
        <button id="backupBtn" class="btn-secondary">📀 Создать бэкап</button>
    </div>
</div>
{% endblock %}
{% block extra_js %}
<script src="{{ url_for('static', filename='admin.js') }}"></script>
<script>
    document.getElementById('backupBtn')?.addEventListener('click', () => {
        showToast('Резервное копирование в разработке', 'info');
    });
</script>
{% endblock %}
