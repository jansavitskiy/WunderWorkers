{% extends 'base.html' %}

{% block title %}Регистрация{% endblock %}

{% block body %}
<h1>📝 Регистрация сотрудника</h1>
<form method="POST">
    <h2>Полное имя (на русском)</h2>
    <input type="text" name="full_name" placeholder="Иванов Иван Иванович" required>

    <h2>Ник (латиницей, уникальный)</h2>
    <input type="text" name="nickname" placeholder="ivanov_ii" required>

    <h2>Пароль (минимум 5 символов)</h2>
    <input type="password" name="password" minlength="5" required>

    <h2>Повторите пароль</h2>
    <input type="password" name="confirm" required>

    <button type="submit">Зарегистрироваться</button>
</form>
<div class="link">
    <a href="{{ url_for('login') }}">Уже есть аккаунт? Войти</a>
</div>
{% endblock %}
